version: '3.8'

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: ai_pandit_test_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_pandit_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_pandit_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-test:
    image: redis:7-alpine
    container_name: ai_pandit_test_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
