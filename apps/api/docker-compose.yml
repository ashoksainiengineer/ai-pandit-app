version: '3.8'

services:
  backend-engine:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        CACHE_BUST: "${CACHE_BUST:-0}"
    container_name: ai_pandit_backend
    ports:
      - "7860:7860"
    environment:
      - NODE_ENV=production
      - PORT=7860
      # Database (Neon Postgres)
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${POSTGRES_URL}
      # AI
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - AI_TIMEOUT_MS=120000
      # App Config
      - REQUEST_TIMEOUT_MS=300000
      - MAX_CONCURRENT_SESSIONS=3
      # Memory Thresholds (aligned with container limits)
      - HEAP_THRESHOLD_GB=8
      - RSS_THRESHOLD_GB=10
      # Auth & Security
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - app-logs:/app/logs
    restart: unless-stopped
    # ═══════════════════════════════════════════════════════════════
    # RESOURCE LIMITS: Tuned for HF Spaces Free Tier (16GB total)
    # Reserve 4GB for OS + buffer, give 12GB to container
    # ═══════════════════════════════════════════════════════════════
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 12G
        reservations:
          cpus: '1'
          memory: 6G
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:7860/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Graceful shutdown: Give 30s for running analyses to drain
    stop_grace_period: 30s

# Named volume for logs (survives container recreates)
volumes:
  app-logs:
    driver: local
