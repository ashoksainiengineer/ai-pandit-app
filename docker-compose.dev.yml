# 🔱 AI-Pandit Development Docker Compose
# ========================================
# Run frontend, backend, and database locally for development

version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-pandit-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      TURSO_DATABASE_URL: file:./dev.db
      AI_API_KEY: ${AI_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    volumes:
      - ./backend:/app
      - ./backend/ephe:/app/ephe:ro
      - backend-node-modules:/app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-pandit-network

  # Frontend Next.js App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-pandit-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules
      - ./backend/ephe:/app/ephe:ro
    command: npm run dev
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-pandit-network

  # SwissEph Test CLI (for calculations)
  swisseph-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-pandit-swisseph
    volumes:
      - ./backend:/app
      - ./backend/ephe:/app/ephe:ro
    command: node scripts/test-swisseph.js
    profiles:
      - test
    networks:
      - ai-pandit-network

volumes:
  backend-node-modules:
  frontend-node-modules:

networks:
  ai-pandit-network:
    driver: bridge
