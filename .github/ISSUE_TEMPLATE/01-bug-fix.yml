name: "Bug Fix"
description: "Track one production bug with reproducible acceptance criteria"
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the issue reliably.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0-BLOCKER
        - P1-RELIABILITY
        - P2-CORRECTNESS
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Allowed Scope
      description: Which files/folders are allowed for this fix?
      placeholder: apps/api/src/routes/..., apps/web/lib/...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Commands
      description: Exact commands that must pass before merge.
      placeholder: |
        npm -w @ai-pandit/api run test
        npm run lint
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk + Rollback
      description: What can break and how will we rollback?
      placeholder: Risk areas and immediate rollback plan.
    validations:
      required: true
