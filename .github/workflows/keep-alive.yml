name: Keep Backend Alive

on:
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Admin DB Check
        run: |
          HF_URL="${{ secrets.HF_SPACE_URL }}"

          if [ -z "$HF_URL" ]; then
            echo "⚠️ HF_SPACE_URL not set. Set it in repository secrets."
            echo "Format: https://your-username-your-space.hf.space"
            exit 0
          fi

          curl -I "${HF_URL}/api/admin/db-check"
