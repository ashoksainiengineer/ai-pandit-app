name: Keep Functions Warm

on:
  schedule:
    # Run every 15 minutes to keep functions warm
    # Note: GitHub Actions schedules are best-effort and may drift
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health (Cloud Run)
        run: |
          curl -sSf "${{ vars.API_URL }}/live" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 1 \
            -H "Accept: application/json" \
            || echo "API ping failed but continuing"

      - name: Ping Ephemeris Health (Cloud Run)
        run: |
          curl -sSf "${{ vars.EPHEMERIS_URL }}/health" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 1 \
            -H "Accept: application/json" \
            || echo "Ephemeris ping failed but continuing"

      - name: Ping Worker Health (Cloud Run)
        run: |
          curl -sSf "${{ vars.WORKER_URL }}/live" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 1 \
            -H "Accept: application/json" \
            || echo "Worker ping failed but continuing"

      - name: Ping Frontend (Vercel)
        run: |
          curl -sSf "${{ vars.VERCEL_URL }}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 1 \
            -H "Accept: text/html" \
            || echo "Frontend ping failed but continuing"

      - name: Log warmup completion
        run: echo "Warmup completed at $(date -u)"
