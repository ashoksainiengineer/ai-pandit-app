name: Hugging Face Keep-Alive

on:
  schedule:
    # Ping every 6 hours to prevent 48-hour sleep
    # HF Spaces sleeps after 48 hours of inactivity
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space Health Endpoint
        run: |
          HF_URL="${{ secrets.HF_SPACE_URL }}"
          
          if [ -z "$HF_URL" ]; then
            echo "⚠️ HF_SPACE_URL not set. Set it in repository secrets."
            echo "Format: https://your-username-ai-pandit.hf.space"
            exit 0
          fi
          
          echo "🔔 Pinging HF Space: $HF_URL"
          
          # Ping with retry and timeout
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "${HF_URL}/health" 2>&1 || echo "000")
          
          if [ "$response" = "200" ]; then
            echo "✅ HF Space is awake and healthy"
          elif [ "$response" = "000" ]; then
            echo "⚠️ HF Space might be sleeping (no response)"
            echo "   It will wake up on next request (~30-60 seconds)"
          else
            echo "⚠️ HF Space returned status: $response"
          fi
          
          echo "⏰ Ping completed at $(date -u)"

      - name: Ping HF Space Root (Secondary)
        run: |
          HF_URL="${{ secrets.HF_SPACE_URL }}"
          
          if [ -n "$HF_URL" ]; then
            # Secondary ping to root endpoint
            curl -s -o /dev/null --max-time 10 "${HF_URL}/" || true
            echo "📡 Secondary ping sent"
          fi
