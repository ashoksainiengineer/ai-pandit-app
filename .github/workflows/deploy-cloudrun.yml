name: Deploy Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'services/ephemeris/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/worker-runtime/**'
      - 'deploy/cloudrun/**'
      - 'scripts/deploy-cloud-run.sh'
      - 'scripts/enforce-idle-cost-guards.sh'
      - 'scripts/verify-deploy-config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/deploy-cloudrun.yml'

concurrency:
  group: deploy-cloudrun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      statuses: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'asia-southeast1' }}
      ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'ai-pandit' }}
      NEON_DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder
      DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder
      AI_API_KEY: build-placeholder-ai-key
      CLERK_SECRET_KEY: build-placeholder-clerk-secret
      ENCRYPTION_SECRET: build-placeholder-encryption-secret-32chars
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: build-placeholder-publishable-key
      NEXT_PUBLIC_BACKEND_URL: https://example.com
      WEB_FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      JOB_EXECUTION_MODE: inline
      USE_ASYNC_JOB_PIPELINE: true
      REDIS_TLS: true
      API_SERVICE_NAME: api-service
      EPHEMERIS_SERVICE_NAME: ephemeris-service
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/shared/**'
              - 'packages/worker-runtime/**'
              - 'deploy/cloudrun/**'
              - 'scripts/deploy-cloud-run.sh'
              - 'scripts/verify-deploy-config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - '.github/workflows/deploy-cloudrun.yml'
            ephemeris:
              - 'services/ephemeris/**'
              - 'deploy/cloudrun/**'
              - 'scripts/deploy-cloud-run.sh'
              - 'scripts/verify-deploy-config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-cloudrun.yml'

      - name: Resolve deploy scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "ephemeris=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.changes.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "ephemeris=${{ steps.changes.outputs.ephemeris }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify deployment contract
        run: npm run test:deploy-config

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ephemeris service
        if: steps.scope.outputs.ephemeris == 'true'
        run: npm run deploy:cloudrun:ephemeris

      - name: Resolve ephemeris service URL
        if: steps.scope.outputs.ephemeris == 'true' || steps.scope.outputs.api == 'true'
        run: |
          EPHEMERIS_URL=$(gcloud run services describe "$EPHEMERIS_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$CLOUD_RUN_REGION" --format='value(status.url)')
          echo "EPHEMERIS_SERVICE_URL=${EPHEMERIS_URL}" >> "$GITHUB_ENV"

      - name: Wait for ephemeris readiness
        if: steps.scope.outputs.ephemeris == 'true' || steps.scope.outputs.api == 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$EPHEMERIS_SERVICE_URL/ready" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          curl -sS "$EPHEMERIS_SERVICE_URL/health" || true
          exit 1

      - name: Deploy API service
        if: steps.scope.outputs.api == 'true'
        run: npm run deploy:cloudrun:api

      - name: Verify API health
        if: steps.scope.outputs.api == 'true'
        run: |
          API_URL=$(gcloud run services describe "$API_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$CLOUD_RUN_REGION" --format='value(status.url)')
          for i in $(seq 1 30); do
            if curl -fsS "$API_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Post-deploy notification
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}';
            const status = jobStatus === 'success' ? 'success' : 'failure';
            const message = status === 'success' 
              ? 'Cloud Run deployment completed successfully'
              : 'Cloud Run deployment failed - check logs';
            
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              context: 'Deploy Cloud Run',
              description: message
            });
