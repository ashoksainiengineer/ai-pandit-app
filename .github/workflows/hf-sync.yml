name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          
          # 1. Clean Slate Push (WHOLE REPO)
          mkdir -p ../sync_temp
          # Copy EVERYTHING except .git
          cp -ra . ../sync_temp/
          rm -rf ../sync_temp/.git
          cd ../sync_temp
          
          # 2. Setup repo with LFS
          git init
          git lfs install
          git lfs track "*.se1"
          git lfs track "*.wasm"
          git lfs track "*.png"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          
          git add .
          git commit -m "Sync whole repo: ${{ github.sha }}"
          
          # 3. Push to Hugging Face
          HF_URL="https://ashoksainiengineer:$HF_TOKEN@huggingface.co/spaces/ashoksainiengineer/ai-pandit"
          git remote add hf "$HF_URL"
          git push hf main:main --force
