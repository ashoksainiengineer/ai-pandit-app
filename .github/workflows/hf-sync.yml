name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -x # Debugging enable karein
          
          # 1. Check if token exists
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN is empty. Please add it to GitHub Secrets."
            exit 1
          fi
          
          # 2. Files check karein
          ls -R backend
          
          # 3. Clean Slate Push
          mkdir -p ../sync_temp
          cp -ra backend/. ../sync_temp/
          cd ../sync_temp
          
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add .
          git commit -m "Sync from GitHub: ${{ github.sha }}"
          
          # 4. Push with detailed error info
          git remote add hf https://ashoksainiengineer:$HF_TOKEN@huggingface.co/spaces/ashoksainiengineer/ai-pandit
          git push hf main:main --force || (echo "PUSH FAILED! Check if token has WRITE access and Space URL is correct." && exit 1)
