name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Git identity setup (required for commit)
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Backend folder ko temporary location pe copy karein
          mkdir ../sync_temp
          cp -ra backend/. ../sync_temp/
          
          # 3. Naya git repo banayein aur push karein
          cd ../sync_temp
          git init
          git add .
          git commit -m "Sync from GitHub: ${{ github.sha }}"
          git remote add hf https://ashoksainiengineer:$HF_TOKEN@huggingface.co/spaces/ashoksainiengineer/ai-pandit
          git push hf master:main --force
