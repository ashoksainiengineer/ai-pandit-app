name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          set -e

          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN not set. Add it in repository secrets."
            exit 1
          fi
          
          if [ -z "$HF_SPACE_REPO" ]; then
            echo "❌ HF_SPACE_REPO not set. Expected format: username/space-name"
            exit 1
          fi
          
          # 1. Clean Slate Push (WHOLE REPO)
          mkdir -p ../sync_temp
          # Copy EVERYTHING except .git
          cp -ra . ../sync_temp/
          rm -rf ../sync_temp/.git
          cd ../sync_temp
          
          # 2. Setup repo with LFS
          git init
          git lfs install
          git lfs track "*.se1"
          git lfs track "*.wasm"
          git lfs track "*.png"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          
          # 3. Exclude non-production files
          # Delete all .md files EXCEPT the root README.md
          find . -name "*.md" ! -name "README.md" -delete
          # Delete other non-production directories and files
          rm -rf **/index.test.ts **/index.test.tsx **/*.test.ts **/*.test.tsx **/__tests__ e2e packages/db/src/__tests__ .agents .gemini .idx docs *.log playwright-report test-results
          rm -f apps/web/lib/utils/direct-test.ts apps/web/lib/utils/stress-test-direct.ts apps/web/lib/utils/memory-prof.ts apps/web/lib/utils/memory-test-direct.ts
          
          git add .
          git commit -m "Sync production files: ${{ github.sha }}"
          
          # 3. Push to Hugging Face
          HF_URL="https://x-access-token:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_REPO"
          git remote add hf "$HF_URL"
          git push hf main:main --force
