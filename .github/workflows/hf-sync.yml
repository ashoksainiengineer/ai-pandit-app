name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          
          # 1. Clean Slate Push
          mkdir -p ../sync_temp
          cp -ra backend/. ../sync_temp/
          cd ../sync_temp
          
          # 2. Setup repo with LFS (Mandatory for binary files on HF)
          git init
          git lfs install
          git lfs track "*.se1"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          
          git add .
          git commit -m "Sync from GitHub: ${{ github.sha }} [LFS enabled]"
          
          # 3. Push to Hugging Face
          HF_URL="https://ashoksainiengineer:$HF_TOKEN@huggingface.co/spaces/ashoksainiengineer/ai-pandit"
          git remote add hf "$HF_URL"
          git push hf main:main --force
