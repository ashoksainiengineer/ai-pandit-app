          desloppify exclude coverage

      - name: Scan packages
        id: scan-packages
        run: |
          desloppify --lang typescript scan --path ./packages --no-badge 2>&1 | tee scan-packages.log
          echo "SCAN_COMPLETE=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Extract packages score
        id: extract-packages
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE=$(grep -oP 'Strict\s+\K[0-9]+\.[0-9]+' scan-packages.log | head -1)
          OVERALL_SCORE=$(grep -oP 'Overall score:\s+\K[0-9]+\.[0-9]+' scan-packages.log | head -1)
          echo "packages_strict_score=$STRICT_SCORE" >> $GITHUB_OUTPUT
          echo "packages_overall_score=$OVERALL_SCORE" >> $GITHUB_OUTPUT
          echo "Packages Strict Score: $STRICT_SCORE"
          echo "Packages Overall Score: $OVERALL_SCORE"

      - name: Check packages score threshold
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE="${{ steps.extract-packages.outputs.packages_strict_score }}"
          if (( $(echo "$STRICT_SCORE < ${{ env.MIN_SCORE_PACKAGES }}" | bc -l) )); then
            echo "❌ Packages score ($STRICT_SCORE) is below minimum threshold (${{ env.MIN_SCORE_PACKAGES }})"
            exit 1
          else
            echo "✅ Packages score ($STRICT_SCORE) meets minimum threshold (${{ env.MIN_SCORE_PACKAGES }})"
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desloppify-packages-scan
          path: |
            scan-packages.log
            scorecard.png
          retention-days: 30

  summary:
    name: Quality Gate Summary
    needs: [quality-gate-web, quality-gate-api, quality-gate-worker, quality-gate-packages]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "# 🏗️ Desloppify Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.quality-gate-web.result }}" == "success" ]; then
            echo "| apps/web | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| apps/web | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.quality-gate-api.result }}" == "success" ]; then
            echo "| apps/api | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| apps/api | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.quality-gate-worker.result }}" == "success" ]; then
            echo "| apps/worker | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| apps/worker | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.quality-gate-packages.result }}" == "success" ]; then
            echo "| packages/* | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| packages/* | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Baseline Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Current Score | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| apps/web | 20.4/100 | 85.0/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| apps/api | 21.0/100 | 85.0/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| apps/worker | 10.3/100 | 85.0/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| packages/* | 16.7/100 | 85.0/100 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review security issues before other cleanup" >> $GITHUB_STEP_SUMMARY
          echo "2. Add test coverage (311 missing tests across all apps)" >> $GITHUB_STEP_SUMMARY
          echo "3. Remove unused code (227 instances)" >> $GITHUB_STEP_SUMMARY
          echo "4. Run \`desloppify review --prepare\` for subjective assessment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 Full report: [docs/DESLOPPIFY_BASELINE_REPORT.md](docs/DESLOPPIFY_BASELINE_REPORT.md)" >> $GITHUB_STEP_SUMMARY
