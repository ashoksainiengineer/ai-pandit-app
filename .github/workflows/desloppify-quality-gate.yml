          echo "SCAN_COMPLETE=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Extract api score
        id: extract-api
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE=$(grep -oP 'Strict\s+\K[0-9]+\.[0-9]+' scan-api.log | head -1)
          OVERALL_SCORE=$(grep -oP 'Overall score:\s+\K[0-9]+\.[0-9]+' scan-api.log | head -1)
          echo "api_strict_score=$STRICT_SCORE" >> $GITHUB_OUTPUT
          echo "api_overall_score=$OVERALL_SCORE" >> $GITHUB_OUTPUT
          echo "API Strict Score: $STRICT_SCORE"
          echo "API Overall Score: $OVERALL_SCORE"

      - name: Check api score threshold
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE="${{ steps.extract-api.outputs.api_strict_score }}"
          if (( $(echo "$STRICT_SCORE < ${{ env.MIN_SCORE_API }}" | bc -l) )); then
            echo "❌ API score ($STRICT_SCORE) is below minimum threshold (${{ env.MIN_SCORE_API }})"
            exit 1
          else
            echo "✅ API score ($STRICT_SCORE) meets minimum threshold (${{ env.MIN_SCORE_API }})"
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desloppify-api-scan
          path: |
            scan-api.log
            scorecard.png
          retention-days: 30

  quality-gate-worker:
    name: Quality Gate - Worker
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_target == 'all' || github.event.inputs.scan_target == 'worker' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
