  quality-gate-packages:
    name: Quality Gate - Packages
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_target == 'all' || github.event.inputs.scan_target == 'packages' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install desloppify
        run: |
          python -m pip install --upgrade pip
          pip install "desloppify[full]"

      - name: Configure exclusions
        run: |
          desloppify exclude node_modules
