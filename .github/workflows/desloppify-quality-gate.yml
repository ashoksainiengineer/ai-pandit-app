name: Desloppify Quality Gate

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/desloppify-quality-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/desloppify-quality-gate.yml'
  workflow_dispatch:
    inputs:
      scan_target:
        description: 'Target to scan (web, api, worker, packages, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - web
          - api
          - worker
          - packages

env:
  PYTHON_VERSION: '3.12'
  MIN_SCORE_WEB: '20.0'
  MIN_SCORE_API: '20.0'
  MIN_SCORE_WORKER: '10.0'
  MIN_SCORE_PACKAGES: '16.0'

jobs:
  quality-gate-web:
    name: Quality Gate - Web
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_target == 'all' || github.event.inputs.scan_target == 'web' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install desloppify
        run: |
          python -m pip install --upgrade pip
          pip install "desloppify[full]"

      - name: Configure exclusions
        run: |
          desloppify exclude node_modules
          desloppify exclude .next
          desloppify exclude dist
          desloppify exclude build
          desloppify exclude .turbo
          desloppify exclude coverage
          desloppify exclude playwright-report
          desloppify exclude test-results

      - name: Scan apps/web
        id: scan-web
        run: |
          desloppify --lang typescript scan --path ./apps/web --no-badge 2>&1 | tee scan-web.log
          echo "SCAN_COMPLETE=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Extract web score
        id: extract-web
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE=$(grep -oP 'Strict\s+\K[0-9]+\.[0-9]+' scan-web.log | head -1)
          OVERALL_SCORE=$(grep -oP 'Overall score:\s+\K[0-9]+\.[0-9]+' scan-web.log | head -1)
          echo "web_strict_score=$STRICT_SCORE" >> $GITHUB_OUTPUT
          echo "web_overall_score=$OVERALL_SCORE" >> $GITHUB_OUTPUT
          echo "Web Strict Score: $STRICT_SCORE"
          echo "Web Overall Score: $OVERALL_SCORE"

      - name: Check web score threshold
        if: env.SCAN_COMPLETE == 'true'
        run: |
          STRICT_SCORE="${{ steps.extract-web.outputs.web_strict_score }}"
          if (( $(echo "$STRICT_SCORE < ${{ env.MIN_SCORE_WEB }}" | bc -l) )); then
            echo "❌ Web score ($STRICT_SCORE) is below minimum threshold (${{ env.MIN_SCORE_WEB }})"
            exit 1
          else
            echo "✅ Web score ($STRICT_SCORE) meets minimum threshold (${{ env.MIN_SCORE_WEB }})"
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desloppify-web-scan
          path: |
            scan-web.log
            scorecard.png
          retention-days: 30

  quality-gate-api:
    name: Quality Gate - API
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_target == 'all' || github.event.inputs.scan_target == 'api' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install desloppify
        run: |
          python -m pip install --upgrade pip
          pip install "desloppify[full]"

      - name: Configure exclusions
        run: |
          desloppify exclude node_modules
