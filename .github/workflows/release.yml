name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                {
                  "title": "Features",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "Bug Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "Documentation",
                  "labels": ["docs", "documentation"]
                },
                {
                  "title": "Dependencies",
                  "labels": ["dependencies", "deps"]
                },
                {
                  "title": "Other Changes",
                  "labels": []
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'asia-southeast1' }}
      ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'ai-pandit' }}
      API_SERVICE_NAME: api-service
      WORKER_SERVICE_NAME: worker-service
      EPHEMERIS_SERVICE_NAME: ephemeris-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all services
        run: |
          npm --workspace @ai-pandit/shared run build
          npm --workspace @ai-pandit/db run build
          npm --workspace @ai-pandit/worker-runtime run build
          npm --workspace @ai-pandit/api run build
          npm --workspace @ai-pandit/worker run build

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy all services (production)
        run: |
          npm run deploy:cloudrun:ephemeris
          npm run deploy:cloudrun:api
          npm run deploy:cloudrun:worker

      - name: Verify all services health
        run: |
          for service in "$API_SERVICE_NAME" "$WORKER_SERVICE_NAME" "$EPHEMERIS_SERVICE_NAME"; do
            URL=$(gcloud run services describe "$service" --project "$GCP_PROJECT_ID" --region "$CLOUD_RUN_REGION" --format='value(status.url)')
            for i in $(seq 1 30); do
              if curl -fsS "$URL/health" >/dev/null || curl -fsS "$URL/live" >/dev/null; then
                echo "$service is healthy"
                break
              fi
              sleep 10
            done
          done

      - name: Apply production worker mode
        run: |
          # For production releases, optionally enable always-on worker
          # Uncomment if needed: sh ./scripts/enable-production-worker-mode.sh
          echo "Production deployment complete"
